<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Surprise for Mera Bachha</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: radial-gradient(circle at top, #ffdde1, #ee9ca7);
      font-family: "Segoe UI", system-ui, sans-serif;
      overflow: hidden;
    }

    .card {
      background: rgba(255, 255, 255, 0.9);
      padding: 30px 40px;
      border-radius: 20px;
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.2);
      text-align: center;
      max-width: 420px;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 25px;
      color: #c2185b;
    }

    .buttons {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 10px;
      position: relative;
    }

    button {
      padding: 10px 25px;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-size: 1rem;
      font-weight: 600;
      transition: transform 0.2s, background 0.2s, color 0.2s;
    }

    #yesBtn {
      background: #e91e63;
      color: #fff;
    }

    #yesBtn:hover {
      transform: scale(1.08);
      background: #c2185b;
    }

    #noBtn {
      background: #f5f5f5;
      color: #444;
      position: relative;
    }

    #noBtn:hover {
      background: #eeeeee;
    }

    .message {
      margin-top: 25px;
      font-size: 1.4rem;
      font-weight: 700;
      color: #d81b60;
      display: none;
    }

    .sub {
      margin-top: 8px;
      font-size: 1rem;
      color: #ad1457;
      display: none;
    }

    /* Hearts shower */
    .heart {
      position: fixed;
      top: -40px;
      font-size: 24px;
      animation: fall linear forwards;
      pointer-events: none;
      z-index: 1;
    }

    @keyframes fall {
      0% {
        transform: translateY(0) translateX(0) rotate(0deg);
        opacity: 1;
      }
      100% {
        transform: translateY(110vh) translateX(var(--drift)) rotate(360deg);
        opacity: 0;
      }
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Kya Mera Bachha Mujhse Bohot Pyaar Karta Hai? 🥹❤️</h1>
    <div class="buttons">
      <button id="yesBtn">YES</button>
      <button id="noBtn">NO</button>
    </div>
    <div class="message" id="loveMsg">I LOVE YOU MERA BACHHA ❤️😘💋</div>
    <div class="sub" id="subMsg">Tum hamesha mera sabse special ho — forever & ever. 💖</div>
  </div>

  <!-- Simple background music (replace src with your own file if you want) -->
  <audio id="bgMusic" loop>
    <!-- You can replace this with your own mp3 URL or local file path -->
    <source src="https://files.freemusicarchive.org/storage-freemusicarchive-org/music/no_curator/Kevin_MacLeod/Calming/Kevin_MacLeod_-_Carefree.mp3" type="audio/mpeg">
  </audio>

  <script>
    const yesBtn = document.getElementById("yesBtn");
    const noBtn = document.getElementById("noBtn");
    const loveMsg = document.getElementById("loveMsg");
    const subMsg = document.getElementById("subMsg");
    const bgMusic = document.getElementById("bgMusic");

    // Start hearts + music on YES
    yesBtn.addEventListener("click", () => {
      loveMsg.style.display = "block";
      subMsg.style.display = "block";

      // Try to play music (browser may ask for interaction permission)
      bgMusic.play().catch(() => {});

      // Start continuous hearts
      startHeartShower();
    });

    // Move NO button away when hovered or clicked
    function moveNoButton() {
      const bodyRect = document.body.getBoundingClientRect();
      const maxX = bodyRect.width - 120;
      const maxY = bodyRect.height - 60;

      const randomX = Math.random() * maxX;
      const randomY = Math.random() * maxY;

      noBtn.style.position = "fixed";
      noBtn.style.left = randomX + "px";
      noBtn.style.top = randomY + "px";
    }

    noBtn.addEventListener("mouseover", moveNoButton);
    noBtn.addEventListener("click", moveNoButton);

    // Heart shower
    function createHeart() {
      const heart = document.createElement("div");
      const emojis = ["❤️", "💖", "💘", "💝", "💋", "😘"];
      heart.classList.add("heart");
      heart.textContent = emojis[Math.floor(Math.random() * emojis.length)];

      const x = Math.random() * window.innerWidth;
      const drift = (Math.random() - 0.5) * 200; // left/right drift

      heart.style.left = x + "px";
      heart.style.setProperty("--drift", drift + "px");
      heart.style.animationDuration = 4 + Math.random() * 3 + "s";

      document.body.appendChild(heart);

      setTimeout(() => {
        heart.remove();
      }, 8000);
    }

    let heartInterval = null;

    function startHeartShower() {
      if (heartInterval) return; // already running
      // Create hearts continuously
      heartInterval = setInterval(() => {
        for (let i = 0; i < 4; i++) {
          createHeart();
        }
      }, 400);
    }
  </script>
</body>
</html>
